apiVersion: batch/v1
kind: Job
metadata:
  name: sd-image-builder
  namespace: nixos-builder
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
      - name: nix
        image: nixos/nix:latest
        args:
        - /bin/sh
        - -c
        - |
          nix-env -iA nixpkgs.git
          git clone --depth 1 https://github.com/EyalRo/nixos.git /build
          cd /build
          nix build .#sdImages.rpi5-1 -o /output/result
          ls -la /output/result/sd-image/
        volumeMounts:
        - name: output
          mountPath: /output
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "8Gi"
      volumes:
      - name: output
        emptyDir:
          sizeLimit: 10Gi
      restartPolicy: Never
      backoffLimit: 0
