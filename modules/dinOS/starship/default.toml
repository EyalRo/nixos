"$schema" = 'https://starship.rs/config-schema.json'

# Tokyo-inspired layout with green shades and sauropod icon.
format = """
[вЦСвЦТвЦУ](#b3f5c0)\
[ рЯ¶Х ](bg:#b3f5c0 fg:#0c130c)\
[оВі](bg:#7bdc92 fg:#b3f5c0)\
$directory\
[оВі](fg:#7bdc92 bg:#3f7f50)\
$git_branch\
$git_status\
[оВі](fg:#3f7f50 bg:#2d5c3a)\
$nodejs\
$rust\
$golang\
$php\
[оВі](fg:#2d5c3a bg:#1f402a)\
$time\
[оВі ](fg:#1f402a)\
\n$character"""

[directory]
style = "fg:#e8ffe9 bg:#7bdc92"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "

[git_branch]
symbol = "пРШ"
style = "bg:#3f7f50"
format = '[[ $symbol $branch ](fg:#b3f5c0 bg:#3f7f50)]($style)'

[git_status]
style = "bg:#3f7f50"
format = '[[($all_status$ahead_behind )](fg:#b3f5c0 bg:#3f7f50)]($style)'

[nodejs]
symbol = "оЬШ"
style = "bg:#2d5c3a"
format = '[[ $symbol ($version) ](fg:#b3f5c0 bg:#2d5c3a)]($style)'

[rust]
symbol = "оЮ®"
style = "bg:#2d5c3a"
format = '[[ $symbol ($version) ](fg:#b3f5c0 bg:#2d5c3a)]($style)'

[golang]
symbol = "оШІ"
style = "bg:#2d5c3a"
format = '[[ $symbol ($version) ](fg:#b3f5c0 bg:#2d5c3a)]($style)'

[php]
symbol = "оШИ"
style = "bg:#2d5c3a"
format = '[[ $symbol ($version) ](fg:#b3f5c0 bg:#2d5c3a)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:#1f402a"
format = '[[ пРЇ $time ](fg:#a8e6a3 bg:#1f402a)]($style)'
